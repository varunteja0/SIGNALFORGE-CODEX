name: Feature request
description: Propose a new strategy, engine capability, or tooling improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: validation
    attributes:
      label: Validation plan
      description: For strategy or risk changes, describe how you'll validate OOS, across regimes, and against costs.
